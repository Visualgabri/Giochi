<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Corsa Infinita per Chris</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #2c3e50; font-family: 'Verdana', sans-serif; touch-action: none; user-select: none; }

        #gameCanvas {
            display: block;
            width: 100vw;
            height: 60vh;
            background: linear-gradient(to bottom, #44afe3 0%, #44afe3 50%, #7f8c8d 50%, #7f8c8d 100%);
        }

        #dashboard {
            height: 40vh;
            background: linear-gradient(#2c3e50, #1a252f);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: inset 0 15px 30px rgba(0,0,0,0.7);
            border-top: 4px solid #34495e;
        }

        #steering-wheel {
            width: 280px;
            height: 280px;
            background: radial-gradient(#34495e, #1a252f);
            border-radius: 50%;
            border: 30px solid #c0392b;
            position: absolute;
            bottom: 5vh;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.05s linear;
            z-index: 5;
        }
        
        #wheel-hub {
            width: 100px;
            height: 100px;
            background: #2c3e50;
            border-radius: 50%;
            border: 5px solid #bdc3c7;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ecf0f1;
            font-weight: bold;
            font-size: 20px;
            cursor: pointer;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.5);
        }
        #wheel-hub:active { background: #e74c3c; transform: scale(0.95); }

        #ui { position: absolute; top: 20px; left: 20px; color: #fff; font-size: 32px; font-weight: bold; text-shadow: 2px 2px 4px #000; z-index: 10; background: rgba(0,0,0,0.3); padding: 5px 15px; border-radius: 10px; }
        #speedo { position: absolute; top: 20px; right: 20px; color: #f1c40f; font-size: 24px; font-weight: bold; z-index: 10; text-align: right;}

        #spiderman { position: absolute; top: -250px; left: 50%; transform: translateX(-50%); font-size: 120px; z-index: 20; transition: top 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); text-align: center; }
        #spiderman-text { font-size: 35px; color: #e74c3c; text-shadow: -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff, 2px 2px 0 #fff; font-weight: 900; display: block; margin-top: -20px;}
        .show-spidey { top: 30px !important; }
    </style>
</head>
<body>

    <div id="ui">Chris: <span id="score">0</span></div>
    <div id="speedo">VELOCITÀ<br><span id="speed-val">100</span> km/h</div>
    
    <div id="spiderman">
        🤟🦸‍♂️🤟
        <span id="spiderman-text">VAI CHRIS!</span>
    </div>

    <canvas id="gameCanvas"></canvas>
    
    <div id="dashboard">
        <div id="steering-wheel">
            <div id="wheel-hub">BEEP!</div>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let engineOsc = null;
        let engineGain = null;
        let audioStarted = false;

        function initAudio() {
            if (audioStarted) return;
            audioStarted = true;
            
            engineOsc = audioCtx.createOscillator();
            engineGain = audioCtx.createGain();
            engineOsc.type = 'sawtooth';
            engineOsc.frequency.setValueAtTime(50, audioCtx.currentTime);
            engineGain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            
            engineOsc.connect(engineGain);
            engineGain.connect(audioCtx.destination);
            engineOsc.start();
        }

        function updateEngineSound(currentSpeed) {
            if (!audioStarted) return;
            let freq = 50 + (currentSpeed * 5);
            engineOsc.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.1);
            let vol = 0.05 + (currentSpeed * 0.005);
            engineGain.gain.setTargetAtTime(vol, audioCtx.currentTime, 0.1);
        }

        function playHorn() {
            if (!audioStarted) return;
            const osc1 = audioCtx.createOscillator();
            const osc2 = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc1.type = 'triangle'; osc2.type = 'triangle';
            osc1.frequency.setValueAtTime(440, audioCtx.currentTime);
            osc2.frequency.setValueAtTime(660, audioCtx.currentTime);
            
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
            
            osc1.connect(gainNode); osc2.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc1.start(); osc2.start();
            osc1.stop(audioCtx.currentTime + 0.5); osc2.stop(audioCtx.currentTime + 0.5);
        }

        function playScoreSound() {
            if (!audioStarted) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
            osc.connect(gainNode); gainNode.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }

        function playBoingSound() {
            if (!audioStarted) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'sine';
            // Suono che scende di frequenza rapidamente, tipico effetto "boing"
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.3);
            gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
            osc.connect(gainNode); gainNode.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const wheel = document.getElementById('steering-wheel');
        const hornElement = document.getElementById('wheel-hub');
        const scoreElement = document.getElementById('score');
        const speedElement = document.getElementById('speed-val');
        const spiderman = document.getElementById('spiderman');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight * 0.6;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let score = 0;
        let speed = 5;
        let roadOffset = 0;
        let obstacles = [];
        let spideyCooldown = false;
        let carBounce = 0; // Controlla il salto della macchina
        
        const carProps = {
            width: 80,
            height: 110,
            y: canvas.height - 120
        }

        const horizonY = canvas.height * 0.5;
        const vanishingPointX = canvas.width / 2;

        let playerXOffset = 0;
        let currentRotation = 0;

        wheel.addEventListener('touchstart', (e) => {
            if (!audioStarted) initAudio();
            startTouchX = e.touches[0].clientX;
        });

        wheel.addEventListener('touchmove', (e) => {
            e.preventDefault();
            let deltaX = e.touches[0].clientX - startTouchX;
            currentRotation = Math.max(-130, Math.min(130, deltaX)); 
            wheel.style.transform = `rotate(${currentRotation}deg)`;
            playerXOffset = currentRotation / 130; 
        }, {passive: false});

        wheel.addEventListener('touchend', () => {
            currentRotation = 0;
            wheel.style.transform = `rotate(0deg)`;
            playerXOffset = 0;
        });

        hornElement.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (!audioStarted) initAudio();
            playHorn();
            // Fai saltare leggermente la macchina quando suona
            if (carBounce === 0) carBounce = 15; 
        });

        function spawnObstacle() {
            const lane = Math.floor(Math.random() * 3) - 1;
            obstacles.push({ 
                lane: lane, 
                z: 0,
                passed: false,
                hit: false // Nuovo stato per gli ostacoli colpiti
            });
            let spawnRate = Math.max(700, 2500 - (speed * 100));
            setTimeout(spawnObstacle, spawnRate);
        }

        function checkSpidermanEvent() {
            if (score > 0 && score % 10 === 0 && !spideyCooldown) {
                spideyCooldown = true;
                spiderman.classList.add('show-spidey');
                setTimeout(() => spiderman.classList.remove('show-spidey'), 3000);
                setTimeout(() => spideyCooldown = false, 10000);
            }
        }

        function get3DProjection(lane, z, yOffset, sizeBase) {
            const pY = horizonY + (z * z) * (canvas.height - horizonY);
            const scale = 0.1 + (z * 0.9);
            const pSize = sizeBase * scale;
            const roadWidthAtZ = canvas.width * scale;
            const pX = vanishingPointX + (lane * roadWidthAtZ / 3) - (playerXOffset * canvas.width * 0.5 * z);
            return { x: pX, y: pY, size: pSize, scale: scale };
        }

        function update() {
            ctx.clearRect(0, canvas.height/2, canvas.width, canvas.height/2);

            ctx.fillStyle = '#7f8c8d';
            ctx.beginPath();
            ctx.moveTo(vanishingPointX - playerXOffset*10, horizonY);
            ctx.lineTo(0, canvas.height);
            ctx.lineTo(canvas.width, canvas.height);
            ctx.lineTo(vanishingPointX - playerXOffset*10, horizonY);
            ctx.fill();

            roadOffset += speed * 0.005;
            if (roadOffset > 1) roadOffset = 0;

            ctx.lineWidth = 2;
            for (let z = 0; z < 1; z += 0.1) {
                let zWithOffset = (z + roadOffset) % 1;
                let lineP = get3DProjection(0, zWithOffset, 0, 0);
                
                if (zWithOffset > 0.1) {
                    ctx.fillStyle = `rgba(255, 255, 255, ${zWithOffset})`;
                    const lw = 15 * lineP.scale;
                    const lh = 50 * lineP.scale;
                    ctx.fillRect(lineP.x - lw/2, lineP.y, lw, lh);
                }
                
                ctx.strokeStyle = '#27ae60';
                ctx.lineWidth = 20 * zWithOffset;
                let bordeS = get3DProjection(-1.6, zWithOffset, 0, 0);
                let bordeD = get3DProjection(1.6, zWithOffset, 0, 0);
                
                ctx.beginPath();
                ctx.moveTo(get3DProjection(-1.6, zWithOffset-0.1, 0,0).x, get3DProjection(-1.6, zWithOffset-0.1, 0,0).y);
                ctx.lineTo(bordeS.x, bordeS.y);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(get3DProjection(1.6, zWithOffset-0.1, 0,0).x, get3DProjection(1.6, zWithOffset-0.1, 0,0).y);
                ctx.lineTo(bordeD.x, bordeD.y);
                ctx.stroke();
            }

            // Gestione animazione salto
            if (carBounce > 0) {
                carBounce -= 2;
            } else if (carBounce < 0) {
                carBounce = 0;
            }

            const carX = canvas.width / 2 - carProps.width / 2;
            const currentCarY = carProps.y - carBounce; // Applica il salto
            
            ctx.fillStyle = '#e74c3c';
            ctx.fillRect(carX, currentCarY, carProps.width, carProps.height - 20);
            ctx.fillStyle = '#c0392b';
            ctx.fillRect(carX - 10, currentCarY + 10, carProps.width + 20, 15);
            ctx.fillStyle = '#34495e';
            ctx.fillRect(carX + 10, currentCarY + 30, carProps.width - 20, 30);
            ctx.fillStyle = '#000';
            ctx.fillRect(carX - 5, currentCarY + carProps.height - 40, 15, 30);
            ctx.fillRect(carX + carProps.width - 10, currentCarY + carProps.height - 40, 15, 30);
            ctx.fillStyle = '#f1c40f';
            ctx.font = 'bold 14px Arial'; ctx.textAlign='center';
            ctx.fillText('CHRIS', canvas.width/2, currentCarY + carProps.height - 15);
            ctx.textAlign='left';

            obstacles.forEach((obs) => {
                obs.z += speed * 0.0005;

                let proj = get3DProjection(obs.lane, obs.z, 0, 60);

                if (obs.z > 0.1 && obs.z < 1.2) {
                    // Se colpito, disegnalo schiacciato o rimpicciolito
                    const renderSize = obs.hit ? proj.size * 0.2 : proj.size;
                    const renderY = obs.hit ? proj.y + proj.size * 0.8 : proj.y;

                    ctx.fillStyle = '#e67e22';
                    ctx.beginPath();
                    ctx.moveTo(proj.x, renderY);
                    ctx.lineTo(proj.x - renderSize/2, renderY + renderSize);
                    ctx.lineTo(proj.x + renderSize/2, renderY + renderSize);
                    ctx.fill();
                    
                    if (!obs.hit) {
                        ctx.fillStyle = '#fff';
                        ctx.beginPath();
                        ctx.moveTo(proj.x - proj.size/4, proj.y + proj.size/2);
                        ctx.lineTo(proj.x + proj.size/4, proj.y + proj.size/2);
                        ctx.lineTo(proj.x + proj.size/3, proj.y + proj.size*0.7);
                        ctx.lineTo(proj.x - proj.size/3, proj.y + proj.size*0.7);
                        ctx.fill();
                    }
                }

                // Logica collisione divertente
                if (obs.z > 0.85 && obs.z < 1.05 && !obs.hit) {
                    const carTargetLane = playerXOffset * 1.5;
                    if (Math.abs(obs.lane + carTargetLane) < 0.5) {
                        obs.hit = true;
                        obs.passed = true; // Così non da punti
                        playBoingSound();
                        carBounce = 30; // Fai saltare la macchina in alto!
                    }
                }

                if (obs.z > 1.05 && !obs.passed && !obs.hit) {
                    obs.passed = true;
                    score++;
                    scoreElement.innerText = score;
                    speed = 5 + Math.floor(score / 5);
                    speedElement.innerText = (speed * 20) + " km/h";
                    playScoreSound();
                    checkSpidermanEvent();
                }
            });

            obstacles = obstacles.filter(obs => obs.z < 1.3);
            updateEngineSound(speed);
            requestAnimationFrame(update);
        }

        setTimeout(() => {
            update();
            spawnObstacle();
        }, 500);
    </script>
</body>
</html>
