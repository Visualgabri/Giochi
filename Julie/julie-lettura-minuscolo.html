<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Julie - Un Nuovo Amico 🐱</title>
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Fredoka+One&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-morning: #fff9c4;
            --highlight-text: #ef6c00;
            --highlight-bg: #ffe0b2;
        }

        body {
            font-family: 'Patrick Hand', cursive;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(to bottom, #fff9c4, #e0f2f1);
            user-select: none;
            padding-bottom: 50px;
            color: #4e342e;
        }

        .container {
            max-width: 800px;
            width: 90%;
            background: rgba(255, 255, 255, 0.96);
            padding: 2rem;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            margin-top: 20px;
            text-align: center;
            border: 6px solid #ffffff;
        }

        h1 { font-family: 'Fredoka One', cursive; color: #ef6c00; font-size: 2rem; margin-bottom: 5px; text-transform: lowercase; }

        .story-box {
            font-size: 1.9rem;
            line-height: 1.7;
            text-align: left;
            padding: 25px;
            background: #fafafa;
            border-radius: 20px;
            border: 3px dashed #ffb74d;
            margin: 15px 0;
            white-space: pre-line;
            color: #5d4037;
        }

        /* --- INTERATTIVITÀ PAROLE --- */
        .interactive-word {
            display: inline-block;
            transition: all 0.2s;
            position: relative;
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 6px;
        }
        
        .interactive-word:hover {
            color: var(--highlight-text);
            background-color: var(--highlight-bg);
            transform: scale(1.1);
            z-index: 10;
        }

        .word-tooltip {
            position: absolute;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 3.5rem;
            background: white;
            padding: 5px 15px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            opacity: 0;
            visibility: hidden;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
            border: 2px solid #ffb74d;
        }

        .interactive-word:hover .word-tooltip {
            opacity: 1;
            visibility: visible;
        }

        /* --- SCENA PROGRESSIVA --- */
        #scene {
            height: 180px;
            background: white;
            border-radius: 20px;
            margin: 20px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 5rem;
            position: relative;
            border: 3px solid #ffe0b2;
            overflow: hidden;
        }

        .item {
            position: absolute;
            animation: bounceIn 0.6s ease-out;
            transition: all 0.5s;
        }

        @keyframes bounceIn {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        /* --- CONTROLLI E STELLE --- */
        .stars-container {
            display: flex;
            gap: 15px;
            font-size: 3.5rem;
            color: #eeeeee;
            justify-content: center;
            margin: 15px 0;
        }

        .star { cursor: pointer; transition: 0.3s; }
        .star.active { color: #ffca28; transform: scale(1.2); text-shadow: 0 0 15px rgba(255, 202, 40, 0.6); }

        #msg { font-size: 1.4rem; color: #ef6c00; font-weight: bold; min-height: 1.5em; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🐱 un nuovo amico a quattro zampe 🐾</h1>
        
        <div class="story-box">
            <div id="textDisplay"></div>
        </div>

        <div id="scene">
            <span id="base">☀️</span>
        </div>

        <div class="controls">
            <div id="msg">leggi la storia e tocca una stella!</div>
            <div class="stars-container">
                <div class="star" onclick="registerRead(1)" id="s1">★</div>
                <div class="star" onclick="registerRead(2)" id="s2">★</div>
                <div class="star" onclick="registerRead(3)" id="s3">★</div>
                <div class="star" onclick="registerRead(4)" id="s4">★</div>
                <div class="star" onclick="registerRead(5)" id="s5">★</div>
            </div>
        </div>
    </div>

    <script>
        const dictionary = {
            "mattina": "☀️", "fratelli": "👫", "laura": "👧", "gino": "👦",
            "casa": "🏠", "scuola": "🏫", "strada": "🛣️", "quercia": "🌳",
            "pioggia": "🌧️", "gattino": "🐱", "braccio": "🫂", "amico": "🐾",
            "zampe": "🐾", "entusiasmo": "🤩"
        };

        const storyText = `questa mattina, due fratelli, laura e gino, sono usciti di casa per andare a scuola. mentre camminavano per strada, hanno visto sotto una quercia, al riparo dalla pioggia, un piccolo gattino. lo hanno preso in braccio e lo hanno portato a scuola con entusiasmo. ora hanno un nuovo amico a quattro zampe.`;

        function buildText() {
            const display = document.getElementById('textDisplay');
            display.innerHTML = storyText.split(' ').map(word => {
                const clean = word.replace(/[.,!?…]/g, '').toLowerCase();
                const emoji = dictionary[clean];
                if (emoji) {
                    return `<span class="interactive-word">${word}<div class="word-tooltip">${emoji}</div></span>`;
                }
                return `<span class="interactive-word">${word}</span>`;
            }).join(' ');
        }

        buildText();

        let count = 0;
        const messages = [
            "brava julie! laura e gino sono usciti! 👫",
            "guarda la grande quercia! 🌳",
            "povero gattino sotto la pioggia! 🌧️🐱",
            "che bello! lo portano a scuola! 🏫",
            "EVVIVA! IL GATTINO È AL SICURO! 🎉🐾"
        ];

        function addItem(emoji, top, left) {
            const scene = document.getElementById('scene');
            const span = document.createElement('span');
            span.innerText = emoji;
            span.className = 'item';
            span.style.top = top + '%';
            span.style.left = left + '%';
            scene.appendChild(span);
        }

        function registerRead(num) {
            if (num !== count + 1) return;
            count = num;

            document.getElementById(`s${count}`).classList.add('active');
            const msgEl = document.getElementById('msg');
            msgEl.innerText = messages[count-1];

            // Aggiorna la scena
            if(count === 1) { addItem("🏠", 50, 20); addItem("👫", 55, 45); }
            if(count === 2) addItem("🌳", 30, 70);
            if(count === 3) { addItem("🌧️", 10, 70); addItem("🐱", 65, 75); }
            if(count === 4) addItem("🏫", 30, 15);
            if(count === 5) {
                addItem("✨", 10, 10);
                addItem("🐾", 50, 50);
                confetti({
                    particleCount: 150,
                    spread: 70,
                    origin: { y: 0.6 },
                    colors: ['#ef6c00', '#ffca28', '#ffffff']
                });
                msgEl.style.color = "#ef6c00";
                msgEl.style.fontSize = "1.8rem";
            }
            
            // Audio feedback
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 440 + (count * 110);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }
    </script>
</body>
</html>
