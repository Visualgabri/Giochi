<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Julie Training Camp: I 6 Nuclei</title>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117;
            --card-bg: #161b22;
            --accent: #58a6ff;
            --success: #3fb950;
            --text: #c9d1d9;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Orbitron', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 { font-family: 'Bungee', cursive; color: var(--accent); margin-bottom: 30px; }

        .training-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 20px;
            width: 95%;
            max-width: 900px;
        }

        .exercise-box {
            background: var(--card-bg);
            border: 2px solid #30363d;
            border-radius: 10px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            transition: 0.3s;
        }

        .exercise-box.completed { border-color: var(--success); box-shadow: 0 0 15px rgba(63, 185, 80, 0.3); }

        .layout-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        .arrow { font-size: 1.8rem; color: #444; transition: 0.3s; }
        .arrow.active { color: var(--accent); text-shadow: 0 0 10px var(--accent); }

        .numbers {
            display: flex;
            flex-direction: column;
            gap: 5px;
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
            min-width: 40px;
        }

        .footer-area {
            border-top: 2px solid #30363d;
            padding-top: 10px;
            width: 100%;
            text-align: center;
        }

        .slashes { font-size: 1.5rem; color: #444; margin-bottom: 5px; }

        input {
            width: 60px;
            background: #0d1117;
            border: 2px solid #30363d;
            border-radius: 5px;
            color: var(--success);
            font-family: 'Bungee', cursive;
            font-size: 1.8rem;
            text-align: center;
            outline: none;
        }

        input:disabled { border: none; background: transparent; }

        .btn-verify {
            margin-top: 10px;
            padding: 5px 15px;
            background: var(--accent);
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
        }

        .feedback { font-size: 0.7rem; margin-top: 5px; height: 12px; color: var(--accent); }
    </style>
</head>
<body>

    <h1>JULIE TRAINING CAMP</h1>
    <p>Completa i 6 nuclei energetici per diventare Campionessa!</p>

    <div class="training-grid" id="grid"></div>

    <script>
        // I dati esatti della tua figura
        const exercises = [
            [2, 3, 3, 1], // Nucleo 1
            [3, 2, 1, 1], // Nucleo 2
            [2, 3, 2, 1], // Nucleo 3
            [1, 3, 1, 2], // Nucleo 4
            [2, 2, 3, 1], // Nucleo 5
            [2, 3, 1, 2]  // Nucleo 6
        ];

        const grid = document.getElementById('grid');

        exercises.forEach((nums, index) => {
            const sum = nums.reduce((a, b) => a + b, 0);
            const box = document.createElement('div');
            box.className = 'exercise-box';
            box.innerHTML = `
                <div class="layout-row">
                    <div class="arrow down">↓</div>
                    <div class="numbers">
                        ${nums.map(n => `<div>${n}</div>`).join('')}
                    </div>
                    <div class="arrow up">↑</div>
                </div>
                <div class="footer-area">
                    <div class="slashes">//</div>
                    <input type="number" id="input-${index}">
                    <div class="feedback" id="feed-${index}"></div>
                    <button class="btn-verify" onclick="check(${index}, ${sum})">VERIFICA</button>
                </div>
            `;
            grid.appendChild(box);
        });

        function check(id, correct) {
            const val = parseInt(document.getElementById(`input-${id}`).value);
            const box = document.getElementsByClassName('exercise-box')[id];
            const feed = document.getElementById(`feed-${id}`);
            const down = box.querySelector('.down');
            const up = box.querySelector('.up');

            if (val === correct) {
                // Primo controllo superato (giù)
                if (!down.classList.contains('active') && !up.classList.contains('active')) {
                    down.classList.add('active');
                    feed.innerText = "GIUSTO! ORA RICONTROLLA IN SU";
                    document.getElementById(`input-${id}`).value = "";
                } 
                // Secondo controllo superato (su)
                else if (down.classList.contains('active')) {
                    down.classList.remove('active');
                    up.classList.add('active');
                    feed.innerText = "NUCLEO STABILIZZATO!";
                    box.classList.add('completed');
                    document.getElementById(`input-${id}`).value = correct;
                    document.getElementById(`input-${id}`).disabled = true;
                    box.querySelector('button').style.display = 'none';
                }
            } else {
                feed.innerText = "ERRORE! Riprova il calcolo.";
                feed.style.color = "#ff7b72";
                setTimeout(() => { feed.style.color = "var(--accent)"; }, 1000);
            }
        }
    </script>
</body>
</html>
