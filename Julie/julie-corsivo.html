<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Julie: Dal Corsivo al Minuscolo 📖</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sfondo: #fff9db; /* Giallo chiaro tipo carta */
            --corsivo-col: #2e5984;
            --minuscolo-col: #d63384;
            --successo: #2fb344;
        }

        body {
            font-family: 'Helvetica', sans-serif;
            background-color: var(--sfondo);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            touch-action: manipulation;
        }

        #game-container {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            width: 85%;
            max-width: 650px;
            border: 5px solid #ffd43b;
        }

        .label {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #999;
            margin-bottom: 5px;
        }

        /* Testo in Corsivo */
        #display-text {
            font-family: 'Caveat', cursive;
            font-size: 90px;
            color: var(--corsivo-col);
            margin: 20px 0;
            min-height: 120px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            user-select: none;
            display: block;
        }

        /* Classe per il passaggio al minuscolo */
        .minuscolo-mode {
            font-family: 'Helvetica', sans-serif !important;
            font-size: 70px !important;
            color: var(--minuscolo-col) !important;
            font-weight: normal;
        }

        .hint-text {
            color: #666;
            font-style: italic;
            margin-bottom: 30px;
        }

        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        button {
            padding: 18px 35px;
            font-size: 22px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 6px 0 #bbb;
            transition: all 0.1s;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #888;
        }

        #check-btn { background-color: var(--successo); color: white; box-shadow: 0 6px 0 #248a35; }
        #skip-btn { background-color: #f1f3f5; color: #495057; }

        #score-display {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 30px;
            background: white;
            padding: 10px 20px;
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div id="score-display">⭐ <span id="stars">0</span></div>

    <div id="game-container">
        <div class="label" id="mode-label">Leggi in corsivo:</div>
        
        <div id="display-text" onclick="toggleStyle()">---</div>
        
        <p class="hint-text">Se hai difficoltà, tocca la parola!</p>

        <div class="btn-group">
            <button id="skip-btn" onclick="nextWord()">Prossima ➡️</button>
            <button id="check-btn" onclick="win()">Ho letto tutto! ✅</button>
        </div>
    </div>

    <script>
        const words = [
            "mela", "sole", "luna", "nido", "topo", 
            "cane", "gatto", "percorso", "scuola", "pane",
            "tavolo", "sedia", "bimbo", "mamma", "papà"
        ];

        let currentWord = "";
        let score = 0;
        const textEl = document.getElementById('display-text');
        const labelEl = document.getElementById('mode-label');
        const starsEl = document.getElementById('stars');

        function nextWord() {
            const index = Math.floor(Math.random() * words.length);
            currentWord = words[index];
            textEl.innerText = currentWord;
            textEl.classList.remove('minuscolo-mode');
            labelEl.innerText = "Leggi in corsivo:";
        }

        function toggleStyle() {
            textEl.classList.toggle('minuscolo-mode');
            if(textEl.classList.contains('minuscolo-mode')) {
                labelEl.innerText = "Ecco lo stampatello minuscolo:";
            } else {
                labelEl.innerText = "Leggi in corsivo:";
            }
        }

        function win() {
            score += 5;
            starsEl.innerText = score;
            textEl.style.transform = "scale(1.2)";
            setTimeout(() => {
                textEl.style.transform = "scale(1)";
                nextWord();
            }, 500);
        }

        // Inizio gioco
        nextWord();
    </script>
</body>
</html>
