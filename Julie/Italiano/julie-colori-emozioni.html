<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Julie - I Colori delle Emozioni 🌈</title>
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Fredoka+One&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-page: #fdfcf0;
            --highlight-text: #4a148c;
            --highlight-bg: #f3e5f5;
            --primary-color: #673ab7;
            --text-color: #311b92;
            --border-color: #b39ddb;
        }

        body {
            font-family: 'Patrick Hand', cursive;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: var(--bg-page);
            user-select: none;
            padding-bottom: 50px;
        }

        .container {
            max-width: 800px;
            width: 90%;
            background: #ffffff;
            padding: 2rem;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin-top: 20px;
            text-align: center;
            border: 5px solid var(--border-color);
        }

        h1 { 
            font-family: 'Fredoka One', cursive; 
            color: var(--primary-color); 
            font-size: 2.2rem; 
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .story-box {
            font-size: 1.7rem;
            line-height: 1.5;
            text-align: left;
            padding: 20px;
            background: #fafafa;
            border-radius: 20px;
            border: 2px dashed var(--border-color);
            margin: 15px 0;
            white-space: pre-line;
            color: var(--text-color);
        }

        .interactive-word {
            display: inline-block;
            transition: all 0.2s;
            position: relative;
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 6px;
        }
        
        .interactive-word:hover {
            color: var(--highlight-text);
            background-color: var(--highlight-bg);
            transform: scale(1.1);
            z-index: 10;
        }

        .word-tooltip {
            position: absolute;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 3.5rem;
            background: white;
            padding: 5px 15px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
            z-index: 100;
            border: 2px solid var(--border-color);
        }

        .interactive-word:hover .word-tooltip {
            opacity: 1;
            visibility: visible;
        }

        #magic-scene {
            height: 180px;
            background: #eee;
            border-radius: 20px;
            margin: 20px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 5rem;
            position: relative;
            border: 3px solid var(--border-color);
            transition: background-color 0.8s, transform 0.3s;
            overflow: hidden;
        }

        .magic-item { position: absolute; animation: bounceIn 0.6s ease-out; }
        @keyframes bounceIn { 0% { transform: scale(0); } 100% { transform: scale(1); } }

        .stars-container { display: flex; gap: 15px; font-size: 3.5rem; color: #d1c4e9; justify-content: center; margin: 15px 0; }
        .star { cursor: pointer; transition: 0.3s; }
        .star.active { color: #ffeb3b; transform: scale(1.2); text-shadow: 0 0 15px rgba(255, 235, 59, 0.6); }
        #msg { font-size: 1.4rem; color: var(--primary-color); font-weight: bold; min-height: 1.5em; }
    </style>
</head>
<body>

    <div class="container">
        <h1>I COLORI DELLE EMOZIONI 🌈</h1>
        
        <div class="story-box">
            <div id="textDisplay"></div>
        </div>

        <div id="magic-scene">
            <span id="base-scene">👾</span>
        </div>

        <div class="controls">
            <div id="msg">Sistemiamo le emozioni del mostro? Tocca la prima stella!</div>
            <div class="stars-container">
                <div class="star" onclick="registerRead(1)" id="s1">★</div>
                <div class="star" onclick="registerRead(2)" id="s2">★</div>
                <div class="star" onclick="registerRead(3)" id="s3">★</div>
                <div class="star" onclick="registerRead(4)" id="s4">★</div>
                <div class="star" onclick="registerRead(5)" id="s5">★</div>
            </div>
        </div>
    </div>

    <script>
        const dictionary = {
            "MOSTRO": "👾", "COLORI": "🎨", "EMOZIONI": "🌈", "ALLEGRIA": "💛", 
            "SOLE": "☀️", "TRISTEZZA": "💙", "PIOGGIA": "🌧️", "RABBIA": "❤️", 
            "FUOCO": "🔥", "PAURA": "🖤", "OSCURITÀ": "🌑", "CALMA": "💚", 
            "ALBERI": "🌳", "FOGLIA": "🍃"
        };

        const storyText = `Oggi il mostro dei colori si è svegliato di un umore strano. Non riesce a capire che cosa gli succede. Hai fatto un pasticcio con le tue emozioni. Ti aiuto io a sistemarle.
L'allegria è contagiosa, splende come il sole.
La tristezza è sempre il rimpianto di qualcosa, triste come un giorno di pioggia.
La rabbia si infiamma di rosso vivo, come il fuoco.
La paura si nasconde e fugge nell'oscurità.
La calma è tranquilla come gli alberi e leggera come una foglia al vento.
Se le emozioni sono in ordine, funzionano meglio!`;

        function buildText() {
            const display = document.getElementById('textDisplay');
            display.innerHTML = storyText.split(/\s+/).map(word => {
                const clean = word.replace(/[.,!'’!?…-]/g, '').toUpperCase();
                const emoji = dictionary[clean];
                if (emoji) {
                    return `<span class="interactive-word">${word}<div class="word-tooltip">${emoji}</div></span>`;
                }
                return `<span class="interactive-word">${word}</span>`;
            }).join(' ');
        }

        buildText();

        let count = 0;
        const messages = [
            "L'allegria splende gialla come il sole! ☀️💛",
            "La tristezza è blu come la pioggia... 🌧️💙",
            "La rabbia scotta rossa come il fuoco! 🔥❤️",
            "La paura è nera e scura... 🌑🖤",
            "La calma è verde come gli alberi! BRAVISSIMA JULIE! 🌳💚🎉"
        ];

        function addMagic(emoji, top, left) {
            const scene = document.getElementById('magic-scene');
            const span = document.createElement('span');
            span.innerText = emoji;
            span.className = 'magic-item';
            span.style.top = top + '%';
            span.style.left = left + '%';
            scene.appendChild(span);
        }

        function registerRead(num) {
            if (num !== count + 1) return;
            count = num;
            const scene = document.getElementById('magic-scene');
            document.getElementById(`s${count}`).classList.add('active');
            document.getElementById('msg').innerText = messages[count-1];

            if(count === 1) {
                scene.style.backgroundColor = "#fff59d";
                addMagic("☀️", 20, 20); 
                addMagic("💛", 60, 70);
            }
            if(count === 2) {
                scene.style.backgroundColor = "#90caf9";
                addMagic("🌧️", 15, 75);
                addMagic("💙", 70, 25);
            }
            if(count === 3) {
                scene.style.backgroundColor = "#ef9a9a";
                addMagic("🔥", 40, 15);
                addMagic("❤️", 25, 80);
            }
            if(count === 4) {
                scene.style.backgroundColor = "#b0bec5";
                addMagic("🌑", 70, 75);
                addMagic("🖤", 15, 20);
            }
            if(count === 5) {
                scene.style.backgroundColor = "#a5d6a7";
                addMagic("🌳", 50, 50);
                addMagic("🍃", 20, 45);
                confetti({ 
                    particleCount: 150, 
                    spread: 70, 
                    origin: { y: 0.6 },
                    colors: ['#ffeb3b', '#2196f3', '#f44336', '#4caf50']
                });
            }
            
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 440 + (count * 90);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }
    </script>
</body>
</html>
