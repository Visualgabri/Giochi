<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Julie - Filastrocca di Primavera 🌸</title>
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Fredoka+One&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-spring: #e8f5e9;
            --highlight-text: #2e7d32;
            --highlight-bg: #c8e6c9;
        }

        body {
            font-family: 'Patrick Hand', cursive;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(to bottom, #a5d6a7, #e8f5e9);
            user-select: none;
            padding-bottom: 50px;
            color: #1b5e20;
        }

        .container {
            max-width: 800px;
            width: 90%;
            background: rgba(255, 255, 255, 0.96);
            padding: 2rem;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            margin-top: 20px;
            text-align: center;
            border: 6px solid #ffffff;
        }

        h1 { font-family: 'Fredoka One', cursive; color: #2e7d32; font-size: 2.2rem; margin-bottom: 5px; }

        .story-box {
            font-size: 1.9rem;
            line-height: 1.7;
            text-align: center; /* Filastrocca centrata */
            padding: 25px;
            background: #ffffff;
            border-radius: 20px;
            border: 3px dashed #81c784;
            margin: 15px 0;
            white-space: pre-line;
        }

        .interactive-word {
            display: inline-block;
            transition: all 0.2s;
            position: relative;
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 6px;
        }
        
        .interactive-word:hover {
            color: var(--highlight-text);
            background-color: var(--highlight-bg);
            transform: scale(1.15);
            z-index: 10;
        }

        .word-tooltip {
            position: absolute;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 3.5rem;
            background: white;
            padding: 5px 15px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            opacity: 0;
            visibility: hidden;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
            border: 2px solid #81c784;
        }

        .interactive-word:hover .word-tooltip {
            opacity: 1;
            visibility: visible;
        }

        #spring-scene {
            height: 180px;
            background: #f1f8e9;
            border-radius: 20px;
            margin: 20px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 5rem;
            position: relative;
            border: 3px solid #81c784;
            overflow: hidden;
        }

        .item { position: absolute; animation: bounceIn 0.6s ease-out; }

        @keyframes bounceIn { 0% { transform: scale(0); } 100% { transform: scale(1); } }

        .stars-container { display: flex; gap: 15px; font-size: 3.5rem; color: #c8e6c9; justify-content: center; margin: 15px 0; }
        .star { cursor: pointer; transition: 0.3s; }
        .star.active { color: #fbc02d; transform: scale(1.2); text-shadow: 0 0 15px rgba(251, 192, 45, 0.8); }

        #msg { font-size: 1.4rem; color: #2e7d32; font-weight: bold; min-height: 1.5em; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🌸 FILASTROCCA DI PRIMAVERA 🌸</h1>
        
        <div class="story-box">
            <div id="textDisplay"></div>
        </div>

        <div id="spring-scene">
            <span id="base-scene">🌱</span>
        </div>

        <div class="controls">
            <div id="msg">Fai sbocciare i fiori! Leggi e tocca una stella!</div>
            <div class="stars-container">
                <div class="star" onclick="registerRead(1)" id="s1">★</div>
                <div class="star" onclick="registerRead(2)" id="s2">★</div>
                <div class="star" onclick="registerRead(3)" id="s3">★</div>
                <div class="star" onclick="registerRead(4)" id="s4">★</div>
                <div class="star" onclick="registerRead(5)" id="s5">★</div>
            </div>
        </div>
    </div>

    <script>
        const dictionary = {
            "PRIMAVERA": "🌸", "GIORNO": "☀️", "DOLCE": "🍭", "SERA": "🌙",
            "ERBETTA": "🌿", "VIOLETTA": "🪻", "VIOLA": "🪻", "FRESCA": "🌬️",
            "NUOVA": "✨", "TROVA": "👀", "PROFUMO": "👃", "GIUNTA": "🚶‍♀️"
        };

        const storyText = `Filastrocca di primavera,
più lungo è il giorno, più dolce la sera.
Domani forse tra l'erbetta
spunterà la prima violetta.
O prima viola fresca e nuova,
beato il primo che ti trova,
il tuo profumo gli dirà:
la primavera è giunta, è qua.`;

        function buildText() {
            const display = document.getElementById('textDisplay');
            display.innerHTML = storyText.split('\n').map(line => {
                return line.split(' ').map(word => {
                    const clean = word.replace(/[.,!?…]/g, '').toUpperCase();
                    const emoji = dictionary[clean];
                    if (emoji) {
                        return `<span class="interactive-word">${word}<div class="word-tooltip">${emoji}</div></span>`;
                    }
                    return `<span class="interactive-word">${word}</span>`;
                }).join(' ');
            }).join('<br>');
        }

        buildText();

        let count = 0;
        const messages = [
            "Brava Julie! La primavera sta arrivando! 🌸",
            "Guarda come cresce l'erbetta! 🌿",
            "È spuntata la prima violetta! 🪻",
            "Senti che buon profumo nell'aria? 👃",
            "EVVIVA! LA PRIMAVERA È QUA! 🎉🌼"
        ];

        function addItem(emoji, top, left) {
            const scene = document.getElementById('spring-scene');
            const span = document.createElement('span');
            span.innerText = emoji;
            span.className = 'item';
            span.style.top = top + '%';
            span.style.left = left + '%';
            scene.appendChild(span);
        }

        function registerRead(num) {
            if (num !== count + 1) return;
            count = num;

            document.getElementById(`s${count}`).classList.add('active');
            const msgEl = document.getElementById('msg');
            msgEl.innerText = messages[count-1];

            if(count === 1) addItem("☀️", 10, 10); 
            if(count === 2) addItem("🌿", 60, 20);
            if(count === 3) addItem("🪻", 55, 50);
            if(count === 4) addItem("👃", 40, 70);
            if(count === 5) {
                addItem("🦋", 20, 80);
                addItem("🌼", 65, 80);
                confetti({
                    particleCount: 150,
                    spread: 70,
                    origin: { y: 0.6 },
                    colors: ['#81c784', '#fbc02d', '#ffffff', '#e91e63']
                });
                msgEl.style.color = "#2e7d32";
            }
            
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 440 + (count * 110);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }
    </script>
</body>
</html>
