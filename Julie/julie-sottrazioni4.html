<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Julie Space Math Academy - Challenge Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --space-dark: #0b0e14;
            --neon-blue: #00d4ff;
            --neon-pink: #ff007f;
            --neon-green: #39ff14;
            --gold: #ffcc00;
        }

        body {
            background-color: var(--space-dark);
            color: white;
            font-family: 'Roboto', sans-serif;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }

        .header {
            text-align: center;
            padding: 15px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 3px solid var(--neon-blue);
        }

        h1 { font-family: 'Bungee', cursive; color: var(--neon-blue); margin: 0; font-size: 2rem; }

        .stats-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 15px 0;
            width: 95%;
        }

        .stat-box {
            background: #1a1f29;
            padding: 10px;
            border-radius: 12px;
            border: 2px solid var(--neon-blue);
            flex: 1;
            max-width: 180px;
            text-align: center;
        }

        .stat-label { font-size: 0.7rem; color: #aaa; font-family: 'Bungee'; }
        .stat-value { font-size: 1.4rem; color: var(--gold); font-family: 'Bungee'; }

        .game-area {
            background: rgba(255, 255, 255, 0.02);
            width: 95%;
            height: 70%;
            border-radius: 25px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.1);
            position: relative;
        }

        .mission-text {
            font-size: 1.6rem;
            text-align: center;
            min-height: 3.5rem;
            font-weight: bold;
        }

        .equation-display {
            font-family: 'Bungee', cursive;
            font-size: 5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
        }

        .passi-box {
            width: 110px;
            height: 110px;
            border: 5px solid var(--neon-pink);
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 20px;
            background: rgba(255, 0, 127, 0.1);
            color: var(--neon-pink);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0px var(--neon-pink); }
            50% { transform: scale(1.05); box-shadow: 0 0 25px var(--neon-pink); }
            100% { transform: scale(1); box-shadow: 0 0 0px var(--neon-pink); }
        }

        .number-line-wrapper {
            position: relative;
            margin: 20px 10px 120px 10px;
            height: 40px;
        }

        .line-base {
            height: 8px;
            background: linear-gradient(90deg, transparent, #444, transparent);
            width: 100%;
            position: absolute;
            top: 10px;
        }

        .ticks-container {
            display: flex;
            justify-content: space-between;
            position: relative;
            z-index: 2;
        }

        .tick {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 60px;
            cursor: pointer;
        }

        .planet-dot {
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px white;
            margin-bottom: 10px;
        }

        .tick-num { font-family: 'Bungee', cursive; font-size: 1.6rem; color: #fff; }

        #jumps-svg {
            position: absolute;
            top: 25px;
            left: 0;
            width: 100%;
            height: 150px;
            pointer-events: none;
        }

        .btn-confirm {
            background: var(--neon-green);
            color: black;
            border: none;
            padding: 25px 60px;
            font-family: 'Bungee', cursive;
            font-size: 1.8rem;
            border-radius: 60px;
            cursor: pointer;
            display: none;
            box-shadow: 0 8px 0 #28b80e;
        }

        .celebration {
            position: fixed;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4.5rem;
            font-family: 'Bungee', cursive;
            color: var(--gold);
            z-index: 100;
            display: none;
            text-align: center;
            text-shadow: 0 0 30px var(--gold);
        }

        /* Stile per il Premio Speciale (Foto di Julie) */
        #special-reward {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 200;
            display: none;
            text-align: center;
            background: rgba(0, 0, 0, 0.95);
            padding: 30px;
            border: 8px solid var(--gold);
            border-radius: 40px;
            box-shadow: 0 0 100px var(--gold);
        }

        #special-reward img {
            max-width: 80vw;
            max-height: 55vh;
            border-radius: 20px;
            border: 4px solid white;
        }

        #special-reward p {
            font-family: 'Bungee', cursive;
            color: var(--gold);
            font-size: 2rem;
            margin-top: 20px;
            text-shadow: 2px 2px 0px #000;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Julie Space Academy</h1>
    </div>

    <div class="stats-container">
        <div class="stat-box">
            <span class="stat-label">PUNTI</span>
            <span class="stat-value" id="score">0</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">LIVELLO</span>
            <span class="stat-value" id="level">TERRA</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">COMBO</span>
            <span class="stat-value" id="combo">x1</span>
        </div>
    </div>

    <div class="game-area">
        <div class="mission-text" id="mission-log">Caricamento coordinate...</div>

        <div class="equation-display">
            <span id="eq-p" style="color:var(--neon-blue)">?</span>
            <span>-</span>
            <div class="passi-box" id="eq-steps">?</div>
            <span>=</span>
            <span id="eq-a" style="color:var(--neon-green)">?</span>
        </div>

        <div class="number-line-wrapper">
            <svg id="jumps-svg"></svg>
            <div class="line-base"></div>
            <div class="ticks-container" id="ticks-container"></div>
        </div>

        <center>
            <button class="btn-confirm" id="btn-next" onclick="newMission()">PROSSIMA MISSIONE</button>
        </center>
    </div>

    <div class="celebration" id="victory-text">MISSIONE<br>COMPIUTA!!</div>

    <div id="special-reward">
        <img src="JulieAstronauta.jpg" alt="Julie Astronauta">
        <p>SUPER JULIE!<br>5 MISSIONI COMPLETATE!</p>
    </div>

    <script>
        let score = 0;
        let combo = 1;
        let level = 1;
        let missionsCompleted = 0; // Contatore per la foto premio
        let p, a, correctPassi;
        let currentJumps = 0;
        let currentPos = 0;
        let maxRange = 10;

        function updateStats() {
            document.getElementById('score').innerText = score;
            document.getElementById('combo').innerText = 'x' + combo;
            const levels = ["TERRA", "MARTE", "GIOVE", "NEBULA", "SUPERNOVA"];
            document.getElementById('level').innerText = levels[Math.min(level-1, 4)];
        }

        function newMission() {
            if (score >= 50 && score < 150) { maxRange = 15; level = 2; }
            else if (score >= 150) { maxRange = 20; level = 3; }

            p = Math.floor(Math.random() * (maxRange - 4)) + 4;
            a = Math.floor(Math.random() * (p - 1));
            
            correctPassi = p - a;
            currentJumps = 0;
            currentPos = p;

            document.getElementById('eq-p').innerText = p;
            document.getElementById('eq-a').innerText = a;
            document.getElementById('eq-steps').innerText = "?";
            document.getElementById('mission-log').innerHTML = `Trova la rotta da <span style="color:var(--neon-blue)">${p}</span> a <span style="color:var(--neon-green)">${a}</span>`;
            
            document.getElementById('btn-next').style.display = 'none';
            document.getElementById('jumps-svg').innerHTML = '';
            
            generateTicks();
            updateStats();
        }

        function generateTicks() {
            const container = document.getElementById('ticks-container');
            container.innerHTML = '';
            
            for (let i = 0; i <= maxRange; i++) {
                const t = document.createElement('div');
                t.className = 'tick';
                t.innerHTML = `
                    <div class="planet-dot"></div>
                    <div class="tick-num">${i}</div>
                `;
                t.onclick = () => handleJump(i);
                container.appendChild(t);
            }
        }

        function handleJump(target) {
            if (target === currentPos - 1) {
                const ticks = document.querySelectorAll('.tick');
                
                drawLowerArc(
                    ticks[currentPos].offsetLeft + (ticks[currentPos].offsetWidth / 2),
                    ticks[target].offsetLeft + (ticks[target].offsetWidth / 2)
                );

                currentPos = target;
                currentJumps++;
                document.getElementById('eq-steps').innerText = currentJumps;

                if (currentPos === a) {
                    checkVictory();
                }
            } else if (target < currentPos - 1) {
                document.getElementById('mission-log').innerText = "Errore di rotta! Un pianeta alla volta!";
                combo = 1;
                updateStats();
            }
        }

        function drawLowerArc(x1, x2) {
            const svg = document.getElementById('jumps-svg');
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            const midX = (x1 + x2) / 2;
            path.setAttribute("d", `M ${x1} 10 Q ${midX} 90 ${x2} 10`);
            path.setAttribute("stroke", "var(--neon-pink)");
            path.setAttribute("stroke-width", "5");
            path.setAttribute("fill", "none");
            path.setAttribute("stroke-linecap", "round");
            svg.appendChild(path);
        }

        function checkVictory() {
            const victText = document.getElementById('victory-text');
            const reward = document.getElementById('special-reward');
            
            victText.style.display = 'block';
            
            score += (10 * combo);
            combo++;
            missionsCompleted++;

            setTimeout(() => {
                victText.style.display = 'none';
                
                // Se siamo alla quinta missione, mostriamo Julie!
                if (missionsCompleted === 5) {
                    reward.style.display = 'block';
                    
                    // Mostra la foto per 5 secondi prima di permettere la prossima missione
                    setTimeout(() => {
                        reward.style.display = 'none';
                        document.getElementById('mission-log').innerText = "ECCELLENTE! Continuiamo l'esplorazione?";
                        document.getElementById('btn-next').style.display = 'inline-block';
                        // Resettiamo il contatore se vuoi che la foto riappaia ogni 5 missioni
                        // missionsCompleted = 0; 
                    }, 5000);
                } else {
                    document.getElementById('mission-log').innerText = "SISTEMA AGGIORNATO! Prossimo salto?";
                    document.getElementById('btn-next').style.display = 'inline-block';
                }
            }, 1500);
        }

        window.onload = newMission;
    </script>
</body>
</html>
