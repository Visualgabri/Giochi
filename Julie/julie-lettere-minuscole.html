<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Julie: Missione Minuscolo 💎</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --sfondo: #1a1a2e;
            --pannello: #16213e;
            --accento: #e94560;
            --testo: #ffffff;
            --maiuscolo: #4ecc71;
            --minuscolo: #3498db;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background-color: var(--sfondo);
            color: var(--testo);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
        }

        #game-container {
            background: var(--pannello);
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 0 50px rgba(233, 69, 96, 0.3);
            text-align: center;
            width: 85%;
            max-width: 500px;
            border: 3px solid var(--accento);
            position: relative;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 20px;
            font-weight: 600;
        }

        #timer-bar-container {
            width: 100%;
            height: 15px;
            background: #0f3460;
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        #timer-bar {
            width: 100%;
            height: 100%;
            background: var(--accento);
            transition: width 0.1s linear;
        }

        /* Area di Visualizzazione */
        .word-box {
            background: #0f3460;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        #word-maiuscolo {
            font-size: 55px;
            color: var(--maiuscolo);
            letter-spacing: 4px;
            margin: 0;
            text-transform: uppercase;
        }

        #arrow {
            font-size: 30px;
            margin: 10px 0;
            color: var(--accento);
        }

        #word-minuscolo {
            font-size: 65px;
            color: var(--minuscolo);
            margin: 0;
            min-height: 80px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .show { opacity: 1 !important; }

        /* Bottoni */
        .action-btn {
            background: var(--accento);
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 24px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 6px 0 #950740;
            width: 100%;
            margin-top: 10px;
        }

        .action-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #950740;
        }

        #feedback {
            font-size: 22px;
            margin-top: 20px;
            height: 30px;
            font-weight: 600;
        }

        /* Animazioni */
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }

        .shake { animation: shake 0.3s; }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="stats-bar">
            <span>💎 Gemme: <span id="gems">0</span></span>
            <span>Livello: <span id="lvl">1</span></span>
        </div>

        <div id="timer-bar-container">
            <div id="timer-bar"></div>
        </div>

        <div class="word-box">
            <p id="word-maiuscolo">---</p>
            <div id="arrow">🔽 TRASFORMA 🔽</div>
            <p id="word-minuscolo">---</p>
        </div>

        <button class="action-btn" id="check-btn" onclick="checkRead()">LETTA! ✅</button>
        
        <div id="feedback"></div>
    </div>

    <script>
        const words = [
            "GATTO", "MELA", "CASA", "LIBRO", "SOLE", "PANE", "LUNA", "MARE",
            "FIUME", "PRATO", "BIMBO", "PALLA", "NONNO", "UOVO", "SCUOLA"
        ];

        let currentWord = "";
        let gems = 0;
        let level = 1;
        let timeLeft = 100;
        let timerInterval;

        const maiuscoloEl = document.getElementById('word-maiuscolo');
        const minuscoloEl = document.getElementById('word-minuscolo');
        const gemsEl = document.getElementById('gems');
        const lvlEl = document.getElementById('lvl');
        const barEl = document.getElementById('timer-bar');
        const feedbackEl = document.getElementById('feedback');

        function startLevel() {
            // Reset visuale
            minuscoloEl.classList.remove('show');
            feedbackEl.innerText = "";
            
            // Nuova parola
            currentWord = words[Math.floor(Math.random() * words.length)];
            maiuscoloEl.innerText = currentWord;
            minuscoloEl.innerText = currentWord.toLowerCase();
            
            // Timer più veloce man mano che sale di livello
            timeLeft = 100;
            clearInterval(timerInterval);
            const speed = Math.max(20, 100 - (level * 5)); 
            
            timerInterval = setInterval(() => {
                timeLeft -= 1;
                barEl.style.width = timeLeft + "%";
                
                if(timeLeft <= 0) {
                    gameOver();
                }
            }, speed);
        }

        function checkRead() {
            if (minuscoloEl.classList.contains('show')) {
                // Se ha già visualizzato la soluzione e preme ancora
                nextLevel();
            } else {
                // Al primo click mostra la parola in minuscolo
                minuscoloEl.classList.add('show');
                clearInterval(timerInterval);
                feedbackEl.innerText = "Ottimo! Leggi ora quella blu!";
                feedbackEl.style.color = "#3498db";
                document.getElementById('check-btn').innerText = "PROSSIMA! ➡️";
                playSynth(440, 660);
            }
        }

        function nextLevel() {
            gems += 10;
            level += 1;
            gemsEl.innerText = gems;
            lvlEl.innerText = level;
            document.getElementById('check-btn').innerText = "LETTA! ✅";
            startLevel();
        }

        function gameOver() {
            clearInterval(timerInterval);
            document.getElementById('game-container').classList.add('shake');
            feedbackEl.innerText = "Tempo scaduto! Riprova!";
            feedbackEl.style.color = "#e94560";
            setTimeout(() => {
                document.getElementById('game-container').classList.remove('shake');
                level = Math.max(1, level - 1);
                lvlEl.innerText = level;
                startLevel();
            }, 1500);
        }

        // Feedback sonoro da "Pro"
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSynth(f1, f2) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(f1, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(f2, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);
        }

        // Avvio
        startLevel();
    </script>
</body>
</html>
