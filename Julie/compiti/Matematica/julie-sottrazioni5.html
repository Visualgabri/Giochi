<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Julie: Reattore a Colonna</title>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --neon-yellow: #f0f000;
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --danger: #ff3131;
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 { font-family: 'Bungee', cursive; color: var(--neon-yellow); text-shadow: 0 0 10px var(--neon-yellow); }

        .reactor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 900px;
            margin-top: 30px;
        }

        .tower-card {
            background: #12151d;
            border: 2px solid #333;
            border-radius: 15px;
            padding: 20px;
            position: relative;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .tower-card.active { border-color: var(--neon-blue); box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); }

        .arrows-container {
            display: flex;
            justify-content: space-between;
            width: 120px;
            height: 180px;
            position: relative;
        }

        .numbers-col {
            display: flex;
            flex-direction: column;
            gap: 10px;
            font-family: 'Bungee', cursive;
            font-size: 2rem;
            color: white;
            z-index: 2;
        }

        .arrow {
            width: 20px;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            color: #444;
            font-size: 1.5rem;
        }

        .arrow.active { color: var(--neon-purple); text-shadow: 0 0 5px var(--neon-purple); }

        .result-line {
            width: 80px;
            height: 4px;
            background: #444;
            margin: 15px 0;
        }

        input {
            width: 80px;
            background: transparent;
            border: 2px solid #444;
            border-radius: 10px;
            color: var(--neon-yellow);
            font-family: 'Bungee', cursive;
            font-size: 2rem;
            text-align: center;
            outline: none;
        }

        input:focus { border-color: var(--neon-blue); }

        .status-msg {
            margin-top: 15px;
            font-size: 0.9rem;
            height: 20px;
            color: #aaa;
        }

        .btn-check {
            margin-top: 15px;
            padding: 10px 20px;
            background: var(--neon-purple);
            border: none;
            border-radius: 5px;
            font-family: 'Bungee', cursive;
            cursor: pointer;
            color: white;
        }
    </style>
</head>
<body>

    <h1>Reattore a Colonna Julie</h1>
    <div id="mission-info" style="font-size: 1.2rem; margin-bottom: 20px;">Carica i nuclei energetici sommando i numeri!</div>

    <div class="reactor-grid" id="grid">
        </div>

    <script>
        const grid = document.getElementById('grid');
        let currentLevel = 1;

        function createTower() {
            const numbers = Array.from({length: 4}, () => Math.floor(Math.random() * 4) + 1);
            const sum = numbers.reduce((a, b) => a + b, 0);
            
            const card = document.createElement('div');
            card.className = 'tower-card active';
            
            card.innerHTML = `
                <div class="arrows-container">
                    <div class="arrow" id="down-arrow">↓</div>
                    <div class="numbers-col">
                        ${numbers.map(n => `<div>${n}</div>`).join('')}
                    </div>
                    <div class="arrow" id="up-arrow">↑</div>
                </div>
                <div class="result-line"></div>
                <input type="number" placeholder="?">
                <div class="status-msg">Somma dall'alto al basso!</div>
                <button class="btn-check">VERIFICA</button>
            `;

            const input = card.querySelector('input');
            const btn = card.querySelector('button');
            const status = card.querySelector('.status-msg');
            const downArrow = card.querySelector('#down-arrow');
            const upArrow = card.querySelector('#up-arrow');

            downArrow.classList.add('active');
            let stage = 'TOP_DOWN'; // o 'BOTTOM_UP'

            btn.onclick = () => {
                const val = parseInt(input.value);
                if (val === sum) {
                    if (stage === 'TOP_DOWN') {
                        stage = 'BOTTOM_UP';
                        downArrow.classList.remove('active');
                        upArrow.classList.add('active');
                        status.innerText = "BRAVA! Ora ricontrolla dal basso!";
                        input.value = "";
                        status.style.color = 'var(--neon-blue)';
                    } else {
                        status.innerText = "NUCLEO CARICO! 🌟";
                        status.style.color = 'var(--neon-yellow)';
                        card.style.borderColor = 'var(--neon-yellow)';
                        btn.style.display = 'none';
                        setTimeout(() => {
                            card.remove();
                            createTower();
                        }, 2000);
                    }
                } else {
                    status.innerText = "ERRORE DI CALCOLO!";
                    status.style.color = 'var(--danger)';
                    input.value = "";
                }
            };

            grid.appendChild(card);
        }

        // Crea le prime 3 torri
        for(let i=0; i<3; i++) createTower();
    </script>
</body>
</html>
