<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Sfida dei Passi di Julie</title>
    <style>
        :root {
            --primary: #2e7d32;
            --secondary: #1976d2;
            --accent: #d32f2f;
            --bg: #f9f9f9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #333;
        }

        .game-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        h1 { color: var(--primary); margin-bottom: 10px; }
        .instruction { font-size: 1.2rem; margin-bottom: 20px; font-weight: bold; min-height: 1.5em; }

        .equation {
            font-size: 3rem;
            margin: 20px 0;
            letter-spacing: 5px;
            background: #eee;
            padding: 10px;
            border-radius: 10px;
        }

        .number-line-container {
            position: relative;
            margin: 80px 0 40px 0;
            padding: 0 20px;
            height: 100px;
        }

        .line {
            height: 4px;
            background: #333;
            width: 100%;
            position: relative;
        }

        .numbers {
            display: flex;
            justify-content: space-between;
            position: absolute;
            width: 100%;
            top: 20px;
            left: 0;
        }

        .num-tick {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s;
            user-select: none;
        }

        .num-tick:hover { transform: scale(1.3); }

        .dot {
            width: 12px;
            height: 12px;
            background: #333;
            border-radius: 50%;
            margin-bottom: 5px;
        }

        .num-label { font-weight: bold; font-size: 1.1rem; }

        .active-p { color: var(--secondary); transform: scale(1.4); }
        .active-p .dot { background: var(--secondary); }
        .active-a { color: var(--accent); transform: scale(1.4); }
        .active-a .dot { background: var(--accent); }

        .label-p, .label-a {
            position: absolute;
            top: -45px;
            font-weight: bold;
            font-size: 1.2rem;
        }
        .label-p { color: var(--secondary); }
        .label-a { color: var(--accent); }

        #svg-overlay {
            position: absolute;
            top: -60px;
            left: 0;
            width: 100%;
            height: 80px;
            pointer-events: none;
        }

        .btn {
            padding: 12px 25px;
            font-size: 1rem;
            cursor: pointer;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 5px;
            margin-top: 20px;
        }

        .btn:disabled { background: #ccc; }

        .score-board { margin-top: 20px; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>Sottrazioni sulla Linea 📏</h1>
        <div class="score-board">Sfida per Julie | Punti: <span id="points">0</span></div>
        
        <div class="equation" id="equation-display">? - ? = ?</div>
        <div class="instruction" id="instruction">Clicca il punto di Partenza (P)</div>

        <div class="number-line-container">
            <svg id="svg-overlay"></svg>
            <div class="line"></div>
            <div class="numbers" id="numbers-row">
                </div>
        </div>

        <button class="btn" id="next-btn" style="display:none" onclick="startNewRound()">Prossima Sfida!</button>
    </div>

    <script>
        let currentP, currentPassi, currentA;
        let selectedP = null;
        let selectedA = null;
        let gameState = 'START'; // START, STEPS, END
        let points = 0;
        let maxRange = 10;

        const numbersRow = document.getElementById('numbers-row');
        const instruction = document.getElementById('instruction');
        const eqDisplay = document.getElementById('equation-display');
        const svg = document.getElementById('svg-overlay');

        function initLine() {
            numbersRow.innerHTML = '';
            for (let i = 0; i <= maxRange; i++) {
                const tick = document.createElement('div');
                tick.className = 'num-tick';
                tick.innerHTML = `<div class="dot"></div><div class="num-label">${i}</div>`;
                tick.onclick = () => handleNumberClick(i);
                numbersRow.appendChild(tick);
            }
        }

        function startNewRound() {
            // Logica per variare difficoltà
            maxRange = points >= 5 ? 20 : 10;
            initLine();

            currentP = Math.floor(Math.random() * (maxRange - 1)) + 1;
            currentPassi = Math.floor(Math.random() * currentP) + 1;
            currentA = currentP - currentPassi;

            selectedP = null;
            selectedA = null;
            gameState = 'START';
            
            eqDisplay.innerHTML = `${currentP} - ${currentPassi} = ?`;
            instruction.innerHTML = `Clicca il punto di <b>Partenza (P)</b>: il numero ${currentP}`;
            instruction.style.color = 'var(--secondary)';
            svg.innerHTML = '';
            document.getElementById('next-btn').style.display = 'none';
            
            updateVisuals();
        }

        function handleNumberClick(n) {
            if (gameState === 'START') {
                if (n === currentP) {
                    selectedP = n;
                    gameState = 'STEPS';
                    instruction.innerHTML = `Ora fai <b>${currentPassi}</b> passi indietro! <br><small>(Clicca sulla linea per saltare)</small>`;
                    instruction.style.color = '#333';
                    document.body.onclick = (e) => {
                        // Impedisce click accidentali subito dopo la selezione
                        if(gameState === 'STEPS') drawSteps();
                    };
                }
            } else if (gameState === 'END') {
                if (n === currentA) {
                    selectedA = n;
                    points++;
                    document.getElementById('points').innerText = points;
                    instruction.innerHTML = "🎉 Bravissima Julie! Sottrazione corretta!";
                    instruction.style.color = 'var(--primary)';
                    eqDisplay.innerHTML = `${currentP} - ${currentPassi} = ${currentA}`;
                    document.getElementById('next-btn').style.display = 'inline-block';
                    gameState = 'FINISHED';
                } else {
                    instruction.innerHTML = "Ops! Conta bene i passi. Dove sei arrivata?";
                    instruction.style.color = 'var(--accent)';
                }
            }
            updateVisuals();
        }

        function drawSteps() {
            if (gameState !== 'STEPS') return;
            
            svg.innerHTML = '';
            const ticks = document.querySelectorAll('.num-tick');
            const startTick = ticks[currentP].getBoundingClientRect();
            const containerRect = svg.getBoundingClientRect();

            let count = 0;
            const interval = setInterval(() => {
                if (count >= currentPassi) {
                    clearInterval(interval);
                    gameState = 'END';
                    instruction.innerHTML = `Dove sei arrivata? Clicca il punto di <b>Arrivo (A)</b>`;
                    return;
                }

                const fromIdx = currentP - count;
                const toIdx = currentP - count - 1;
                
                const fromX = ticks[fromIdx].offsetLeft + 6;
                const toX = ticks[toIdx].offsetLeft + 6;
                
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                const midX = (fromX + toX) / 2;
                const curveHeight = 30;
                
                path.setAttribute("d", `M ${fromX} 70 Q ${midX} ${70 - curveHeight} ${toX} 70`);
                path.setAttribute("stroke", "var(--secondary)");
                path.setAttribute("stroke-width", "3");
                path.setAttribute("fill", "none");
                path.setAttribute("marker-end", "url(#arrowhead)");
                
                svg.appendChild(path);
                count++;
            }, 300);

            // Aggiungi marker freccia
            const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
            defs.innerHTML = `
                <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
                    <polygon points="0 0, 10 3.5, 0 7" fill="var(--secondary)" />
                </marker>`;
            svg.appendChild(defs);
        }

        function updateVisuals() {
            const ticks = document.querySelectorAll('.num-tick');
            ticks.forEach((t, i) => {
                t.classList.remove('active-p', 'active-a');
                t.innerHTML = `<div class="dot"></div><div class="num-label">${i}</div>`;
                
                if (i === selectedP) {
                    t.classList.add('active-p');
                    t.innerHTML = `<div class="label-p">P</div>` + t.innerHTML;
                }
                if (i === selectedA) {
                    t.classList.add('active-a');
                    t.innerHTML = `<div class="label-a">A</div>` + t.innerHTML;
                }
            });
        }

        startNewRound();
    </script>
</body>
</html>
