<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Julie: La Cacciatrice di Passi</title>
    <style>
        :root { --p-color: #1976d2; --a-color: #d32f2f; --step-color: #2e7d32; }
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f4f8; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); width: 90%; max-width: 800px; text-align: center; }
        .equation { font-size: 3.5rem; font-weight: bold; margin: 20px 0; color: #333; }
        .box { display: inline-block; width: 70px; height: 80px; border: 4px dashed #ccc; border-radius: 10px; vertical-align: middle; line-height: 80px; color: var(--step-color); }
        .line-container { position: relative; margin: 100px 0 60px 0; height: 50px; padding: 0 40px; }
        .main-line { height: 4px; background: #333; width: 100%; position: relative; }
        .ticks { display: flex; justify-content: space-between; width: 100%; position: absolute; top: -10px; }
        .tick { display: flex; flex-direction: column; align-items: center; cursor: pointer; width: 40px; }
        .dot { width: 12px; height: 12px; background: #333; border-radius: 50%; }
        .num { margin-top: 10px; font-weight: bold; font-size: 1.2rem; }
        .marker { position: absolute; top: -50px; font-weight: bold; font-size: 1.5rem; }
        #svg-steps { position: absolute; top: -70px; left: 0; width: 100%; height: 100px; pointer-events: none; }
        .btn { padding: 15px 30px; font-size: 1.2rem; background: var(--step-color); color: white; border: none; border-radius: 10px; cursor: pointer; margin-top: 20px; }
        .instructions { font-size: 1.3rem; margin-bottom: 20px; min-height: 1.6em; }
        .active-p { color: var(--p-color); }
        .active-a { color: var(--a-color); }
    </style>
</head>
<body>

<div class="card">
    <h1>Quanti passi ha fatto Julie? 🐾</h1>
    <div class="instructions" id="hint">Trova quanti passi servono per arrivare da P a A!</div>
    
    <div class="equation">
        <span id="display-p" class="active-p">?</span> - 
        <div class="box" id="step-box">?</div> = 
        <span id="display-a" class="active-a">?</span>
    </div>

    <div class="line-container">
        <svg id="svg-steps"></svg>
        <div class="main-line"></div>
        <div class="ticks" id="tick-row"></div>
    </div>

    <button class="btn" id="check-btn" onclick="checkAnswer()" style="display:none">Controlla i passi!</button>
    <button class="btn" id="next-btn" onclick="setupGame()" style="display:none">Nuova sfida!</button>
</div>

<script>
    let p, a, correctSteps;
    let userSteps = 0;
    let currentPos = 0;

    function setupGame() {
        p = Math.floor(Math.random() * 8) + 3; // Partenza tra 3 e 10
        a = Math.floor(Math.random() * p);     // Arrivo minore di P
        correctSteps = p - a;
        userSteps = 0;
        currentPos = p;

        document.getElementById('display-p').innerText = p;
        document.getElementById('display-a').innerText = a;
        document.getElementById('step-box').innerText = "?";
        document.getElementById('hint').innerHTML = `Parti da <b>${p}</b> e arriva a <b>${a}</b>. Clicca i numeri per saltare!`;
        document.getElementById('check-btn').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
        
        drawTicks();
        clearSteps();
    }

    function drawTicks() {
        const row = document.getElementById('tick-row');
        row.innerHTML = '';
        for (let i = 0; i <= 10; i++) {
            const t = document.createElement('div');
            t.className = 'tick';
            if(i === p) t.classList.add('active-p');
            if(i === a) t.classList.add('active-a');
            
            t.innerHTML = `
                <div class="marker">${i===p?'P':(i===a?'A':'')}</div>
                <div class="dot" style="background:${i===p?'var(--p-color)':(i===a?'var(--a-color)':'#333')}"></div>
                <div class="num">${i}</div>
            `;
            t.onclick = () => makeStep(i);
            row.appendChild(t);
        }
    }

    function makeStep(target) {
        if (target === currentPos - 1) {
            const ticks = document.querySelectorAll('.tick');
            const fromX = ticks[currentPos].offsetLeft + 20;
            const toX = ticks[target].offsetLeft + 20;
            
            drawArc(fromX, toX);
            
            currentPos = target;
            userSteps++;
            document.getElementById('step-box').innerText = userSteps;

            if (currentPos === a) {
                document.getElementById('hint').innerText = "Sei arrivata a destinazione! È giusto il numero dei passi?";
                document.getElementById('check-btn').style.display = 'inline-block';
            }
        }
    }

    function drawArc(x1, x2) {
        const svg = document.getElementById('svg-steps');
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        const midX = (x1 + x2) / 2;
        path.setAttribute("d", `M ${x1} 80 Q ${midX} 40 ${x2} 80`);
        path.setAttribute("stroke", "var(--step-color)");
        path.setAttribute("stroke-width", "3");
        path.setAttribute("fill", "none");
        svg.appendChild(path);
    }

    function checkAnswer() {
        if (userSteps === correctSteps) {
            document.getElementById('hint').innerHTML = "🌟 <b>ECCELLENTE!</b> Hai contato esattamente i passi!";
            document.getElementById('step-box').style.border = "4px solid var(--step-color)";
        } else {
            document.getElementById('hint').innerText = "Quasi! Riconta i salti che hai fatto sulla linea.";
        }
        document.getElementById('check-btn').style.display = 'none';
        document.getElementById('next-btn').style.display = 'inline-block';
    }

    function clearSteps() {
        document.getElementById('svg-steps').innerHTML = '';
        document.getElementById('step-box').style.border = "4px dashed #ccc";
    }

    setupGame();
</script>
</body>
</html>
