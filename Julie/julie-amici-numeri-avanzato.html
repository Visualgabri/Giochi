<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gli Amici dei Numeri - Missione Julie</title>
    <style>
        /* Reset e ottimizzazione per Tablet */
        * { box-sizing: border-box; touch-action: manipulation; }
        body { 
            font-family: 'Arial Rounded MT Bold', 'Comic Sans MS', sans-serif; 
            background-color: #e0f7fa; 
            color: #263238;
            text-align: center; 
            margin: 0; 
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
        }
        
        /* Contatore Stelle Globale */
        #scoreBoard {
            position: absolute; top: 20px; right: 20px;
            background-color: #fff9c4; border: 3px solid #fbc02d;
            border-radius: 20px; padding: 10px 20px;
            font-size: 1.8rem; font-weight: bold; color: #f57f17;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: flex; align-items: center; gap: 10px;
            transition: transform 0.2s;
        }

        h1 { font-size: 2.8rem; color: #00838f; margin-bottom: 5px; margin-top: 60px; user-select: none; -webkit-user-select: none; }
        
        /* Menu Principale */
        #menuArea {
            background: white; padding: 30px; border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 90%; max-width: 600px;
            display: flex; flex-direction: column; align-items: center;
            margin-top: 20px;
        }
        .menu-subtitle { font-size: 1.5rem; color: #546e7a; margin-bottom: 20px; }
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 100%; }
        
        /* Barra Progresso */
        .progress-container {
            width: 90%; max-width: 600px; height: 30px; 
            background-color: #b2ebf2; border-radius: 15px; 
            margin-bottom: 20px; overflow: hidden;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
            display: none;
        }
        .progress-bar {
            height: 100%; width: 0%; 
            background-color: #00e676; 
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Area di Gioco */
        .game-board {
            background: white; padding: 40px; border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 90%; max-width: 600px; display: none;
        }
        .target-text { font-size: 2rem; color: #546e7a; margin-bottom: 20px; }
        .equation { font-size: 5rem; font-weight: bold; color: #ff5722; margin-bottom: 40px; }
        
        /* Pulsanti */
        .options-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .btn {
            font-size: 3rem; padding: 20px; border-radius: 20px;
            background-color: #29b6f6; color: white; border: none;
            box-shadow: 0 8px 0 #0288d1; cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s, background-color 0.2s;
            user-select: none; -webkit-user-select: none;
        }
        .btn:active { transform: translateY(8px); box-shadow: 0 0 0 #0288d1; }
        .btn.correct { background-color: #00e676; box-shadow: 0 8px 0 #00c853; }
        .btn.wrong { background-color: #ef5350; box-shadow: 0 8px 0 #c62828; animation: shake 0.4s; }
        .btn-menu { background-color: #ab47bc; box-shadow: 0 8px 0 #7b1fa2; font-size: 2.5rem; padding: 15px;}
        .btn-menu:active { box-shadow: 0 0 0 #7b1fa2; }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
            100% { transform: translateX(0); }
        }

        /* Vittoria */
        #victory { display: none; font-size: 2.5rem; color: #ff9800; animation: popIn 0.5s; flex-direction: column; align-items: center; text-align: center;}
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        /* Pannello Segreto Analitiche */
        #secretPanel {
            display: none; position: fixed; top: 10%; left: 10%; width: 80%; max-height: 80%;
            background: rgba(38, 50, 56, 0.95); color: #eceff1; border-radius: 20px;
            padding: 30px; overflow-y: auto; z-index: 1000; text-align: left;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); font-family: monospace; font-size: 1.2rem;
        }
        #secretPanel h2 { color: #00e676; margin-top: 0; }
        .error-item { border-bottom: 1px solid #546e7a; padding: 10px 0; }
        .close-btn { 
            background: #ef5350; color: white; border: none; padding: 10px 20px; 
            font-size: 1.2rem; border-radius: 10px; cursor: pointer; float: right;
        }
    </style>
</head>
<body>

    <div id="scoreBoard">⭐ <span id="totalStars">0</span></div>

    <h1 id="mainTitle">Forza Julie! 🚀</h1>
    
    <div class="progress-container" id="progressContainer">
        <div class="progress-bar" id="progress"></div>
    </div>

    <div id="menuArea">
        <div class="menu-subtitle">Scegli quali amici imparare oggi:</div>
        <div class="menu-grid" id="menuGrid"></div>
    </div>

    <div class="game-board" id="gameArea">
        <div class="target-text">Troviamo gli amici del <strong id="targetDisplay"></strong></div>
        <div class="equation"><span id="givenNumber"></span> + ?</div>
        <div class="options-grid" id="options"></div>
    </div>

    <div id="victory">
        <div id="victoryMsg">🎉 Super! Hai completato l'allenamento! 🎉</div>
        <button class="btn btn-menu" style="margin-top: 40px; padding: 15px 30px;" onclick="showMenu()">Torna al Menu</button>
    </div>

    <div id="secretPanel">
        <button class="close-btn" onclick="document.getElementById('secretPanel').style.display='none'">Chiudi</button>
        <h2>📊 Pannello Dati Errori</h2>
        <button class="close-btn" style="background:#ff9800; margin-right: 10px;" onclick="clearData()">Resetta Dati</button>
        <p>Qui sono registrate le combinazioni che hanno richiesto più tentativi.</p>
        <div id="errorList"></div>
    </div>

    <script>
        const totalQuestions = 10;
        let currentTargetSum = 0; 
        let currentQuestion = 0;
        let currentMissing = 0;

        // Inizializzazione Dati da LocalStorage
        let globalScore = parseInt(localStorage.getItem('julieStars')) || 0;
        let errorData = JSON.parse(localStorage.getItem('julieErrors')) || {};

        const menuAreaEl = document.getElementById('menuArea');
        const menuGridEl = document.getElementById('menuGrid');
        const gameAreaEl = document.getElementById('gameArea');
        const victoryEl = document.getElementById('victory');
        const progressContainerEl = document.getElementById('progressContainer');
        const progressEl = document.getElementById('progress');
        const targetDisplayEl = document.getElementById('targetDisplay');
        const givenNumberEl = document.getElementById('givenNumber');
        const optionsEl = document.getElementById('options');
        const totalStarsEl = document.getElementById('totalStars');
        const scoreBoardEl = document.getElementById('scoreBoard');

        // Aggiorna la UI iniziale
        totalStarsEl.textContent = globalScore;

        // Gestione Menu
        function initMenu() {
            menuGridEl.innerHTML = '';
            for(let i = 2; i <= 9; i++) {
                const btn = document.createElement('button');
                btn.className = 'btn btn-menu';
                btn.textContent = i;
                btn.onclick = () => startGame(i);
                menuGridEl.appendChild(btn);
            }
        }

        function showMenu() {
            menuAreaEl.style.display = 'flex';
            gameAreaEl.style.display = 'none';
            victoryEl.style.display = 'none';
            progressContainerEl.style.display = 'none';
        }

        function startGame(targetNumber) {
            currentTargetSum = targetNumber;
            currentQuestion = 0;
            targetDisplayEl.textContent = currentTargetSum;
            progressEl.style.width = '0%';
            
            menuAreaEl.style.display = 'none';
            victoryEl.style.display = 'none';
            gameAreaEl.style.display = 'block';
            progressContainerEl.style.display = 'block';
            
            nextQuestion();
        }

        function nextQuestion() {
            if (currentQuestion >= totalQuestions) {
                gameAreaEl.style.display = 'none';
                progressContainerEl.style.display = 'none';
                victoryEl.style.display = 'flex';
                return;
            }

            const given = Math.floor(Math.random() * (currentTargetSum + 1));
            currentMissing = currentTargetSum - given;
            givenNumberEl.textContent = given;

            let options = new Set();
            options.add(currentMissing);
            while(options.size < 4) {
                let wrongOption = Math.floor(Math.random() * 10);
                if(wrongOption !== currentMissing) {
                    options.add(wrongOption);
                }
            }

            const shuffledOptions = Array.from(options).sort(() => Math.random() - 0.5);

            optionsEl.innerHTML = '';
            shuffledOptions.forEach(num => {
                const btn = document.createElement('button');
                btn.className = 'btn';
                btn.textContent = num;
                btn.onclick = () => checkAnswer(num, btn);
                optionsEl.appendChild(btn);
            });
        }

        // Animazione per l'aggiunta delle stelle
        function popScore() {
            scoreBoardEl.style.transform = 'scale(1.3)';
            setTimeout(() => { scoreBoardEl.style.transform = 'scale(1)'; }, 200);
        }

        function checkAnswer(selected, btnElement) {
            const optionBtns = optionsEl.querySelectorAll('.btn');
            optionBtns.forEach(b => b.style.pointerEvents = 'none');

            if (selected === currentMissing) {
                // Risposta Corretta
                btnElement.classList.add('correct');
                
                // Aggiorna punteggio globale e salva
                globalScore++;
                totalStarsEl.textContent = globalScore;
                localStorage.setItem('julieStars', globalScore);
                popScore();

                currentQuestion++;
                progressEl.style.width = `${(currentQuestion / totalQuestions) * 100}%`;
                
                setTimeout(() => { nextQuestion(); }, 800);
            } else {
                // Risposta Sbagliata - Registra l'errore invisibilmente
                btnElement.classList.add('wrong');
                
                const errorKey = `Amici del ${currentTargetSum}: ${givenNumberEl.textContent} + ? (sbagliato con ${selected})`;
                if (!errorData[errorKey]) errorData[errorKey] = 0;
                errorData[errorKey]++;
                localStorage.setItem('julieErrors', JSON.stringify(errorData));

                setTimeout(() => {
                    btnElement.classList.remove('wrong');
                    optionBtns.forEach(b => b.style.pointerEvents = 'auto');
                }, 500);
            }
        }

        // LINGUAGGIO SEGRETO: Tocca il titolo 5 volte per aprire le statistiche
        let titleClicks = 0;
        let clickTimer;
        document.getElementById('mainTitle').addEventListener('click', () => {
            titleClicks++;
            clearTimeout(clickTimer);
            if (titleClicks >= 5) {
                showSecretStats();
                titleClicks = 0;
            } else {
                clickTimer = setTimeout(() => { titleClicks = 0; }, 1000); // Azzera se passa 1 secondo tra i tap
            }
        });

        function showSecretStats() {
            const panel = document.getElementById('secretPanel');
            const list = document.getElementById('errorList');
            list.innerHTML = '';
            
            const keys = Object.keys(errorData);
            if(keys.length === 0) {
                list.innerHTML = '<p>Nessun errore registrato! Julie è un genio! 🧠</p>';
            } else {
                // Ordina per numero di errori (dal più frequente)
                keys.sort((a, b) => errorData[b] - errorData[a]).forEach(key => {
                    const div = document.createElement('div');
                    div.className = 'error-item';
                    div.innerHTML = `<strong>${errorData[key]} errori</strong> ➔ ${key}`;
                    list.appendChild(div);
                });
            }
            panel.style.display = 'block';
        }

        function clearData() {
            if(confirm('Sei sicuro di voler resettare tutti i dati degli errori e il punteggio delle stelle?')) {
                localStorage.removeItem('julieErrors');
                localStorage.removeItem('julieStars');
                errorData = {};
                globalScore = 0;
                totalStarsEl.textContent = globalScore;
                showSecretStats();
            }
        }

        initMenu();
    </script>
</body>
</html>
